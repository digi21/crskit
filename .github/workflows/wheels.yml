name: Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the result to TestPyPI (a tag publishes to the real PyPI)"
        type: boolean
        default: false

# Builds the Python binding for CPython 3.10-3.13 on Linux, Windows and macOS with cibuildwheel, and
# publishes it: a v* tag goes to PyPI, a manual run with `publish` ticked goes to TestPyPI. As in the
# C++ CI, running the tests needs the EPSG SQLite database, which is not versioned: set the repository
# variable EPSG_SQLITE_URL to a URL serving it and the pytest suite runs inside each wheel's
# environment; without it the tests skip themselves (the fixture checks for the file) and the job
# still proves that every wheel builds and imports.
jobs:
  wheels:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-15]

    steps:
      - uses: actions/checkout@v4

      - name: Fetch EPSG database
        shell: bash
        env:
          EPSG_SQLITE_URL: ${{ vars.EPSG_SQLITE_URL }}
        run: |
          if [ -n "$EPSG_SQLITE_URL" ]; then
            curl -fsSL "$EPSG_SQLITE_URL" -o epsg.sqlite
          else
            echo "No EPSG_SQLITE_URL set; the wheels will be built and imported, but the tests will skip."
          fi

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_SKIP: "*-musllinux*"

          # The library is C++23, so the image must carry a compiler that has <format>: manylinux_2_28,
          # whose current images ship GCC 14, the compiler the project targets. The image itself is the
          # one cibuildwheel pins for its release -- do not pin it by hand here: an image newer than the
          # cibuildwheel that drives it no longer carries the CPython 3.8 that the older releases go
          # looking for, and the build dies before it compiles a line.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ENVIRONMENT_LINUX: DIGI21_EPSG_SQLITE=/project/epsg.sqlite

          # cibuildwheel installs delvewheel on its own ONLY for its default repair command. The moment
          # that command is overridden -- as it is right below -- it stops doing so, and the step died
          # with "'delvewheel' is not recognized as an internal or external command" after building a
          # perfectly good wheel. So we install it ourselves.
          CIBW_BEFORE_BUILD_WINDOWS: pip install delvewheel

          # delvewheel needs three corrections here:
          #   --no-mangle-all  it renames every DLL it vendors (crskit.dll -> crskit-<hash>.dll), which
          #                    would defeat the point of linking the shared library: in a host application
          #                    that embeds Python and already has crskit.dll loaded, the loader binds the
          #                    module to that copy BY NAME, so the script shares the library's state
          #                    instead of running against a second copy.
          #   --exclude        crskit.dll already travels inside the package; without this delvewheel goes
          #                    looking for it on the system and fails.
          #   --add-path       the C++ runtime it vendors (msvcp140.dll) must be the one the binaries were
          #                    built against or newer. Taking whatever comes first on PATH is a trap: any
          #                    stale copy shipped by an unrelated program (a JDK, say) is loaded ahead of
          #                    the real one and the module dies with an access violation on import.
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair --exclude crskit.dll --no-mangle-all --add-path C:\Windows\System32
            -w {dest_dir} {wheel}

          CIBW_ENVIRONMENT_WINDOWS: DIGI21_EPSG_SQLITE=$GITHUB_WORKSPACE/epsg.sqlite

          # Both macOS wheels come off the Apple Silicon runner, the x86_64 one by cross-compiling.
          # The Intel image is the other option and it is a worse one: it is capped at Xcode 15, an
          # old libc++ that the library used to be unable to compile against at all, and it is on its
          # way out of GitHub's fleet.
          CIBW_ARCHS_MACOS: arm64 x86_64

          # 13.4 is not cosmetic. libc++ keeps parts of <charconv> in the system dylib and gates them
          # by OS version; the library steers well clear of the floating-point from_chars, which Apple
          # only made available in macOS 26, but the rest of the C++23 surface still needs a modern
          # enough libc++ to link against.
          CIBW_ENVIRONMENT_MACOS: >
            DIGI21_EPSG_SQLITE=$GITHUB_WORKSPACE/epsg.sqlite
            MACOSX_DEPLOYMENT_TARGET=13.4

          # delocate would otherwise vendor a SECOND copy of libcrskit.dylib into .dylibs/ and point
          # the module at it. The library already travels inside the package and _crskit resolves it
          # through @loader_path -- same reasoning as --exclude crskit.dll on Windows above.
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --exclude libcrskit --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

          # The x86_64 wheels are cross-compiled on an arm64 runner, which cannot execute them (these
          # runners carry no Rosetta). They are built and repaired, but only the arm64 ones are tested.
          CIBW_TEST_SKIP: "*-macosx_x86_64"

          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: pytest {project}/python/tests

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # The source distribution: the fallback for any platform we ship no wheel for, and what PyPI shows
  # as the project's source. It needs no compiler here -- it is only an archive of the tree.
  sdist:
    name: sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  # Publishing goes through PyPI's trusted publishing: the id-token permission below lets this job mint
  # a short-lived OIDC token that PyPI trades for an upload token, so there is no API key stored in this
  # repository to leak. It is configured once on PyPI's side, as a pending publisher naming this
  # repository, this workflow file and the environment below.
  publish:
    name: Publish
    needs: [wheels, sdist]
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish
    runs-on: ubuntu-24.04
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'pypi' || 'testpypi' }}
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
